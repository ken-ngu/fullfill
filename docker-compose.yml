services:
  db:
    image: postgres:16-alpine
    container_name: fullfill_db
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-fullfill}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-fullfill}
      POSTGRES_DB: ${POSTGRES_DB:-fullfill}
    ports:
      - "5432:5432"
    volumes:
      - db_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-fullfill}"]
      interval: 5s
      timeout: 3s
      retries: 10

  redis:
    image: redis:7-alpine
    container_name: fullfill_redis
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10

  backend:
    build:
      context: ./backend
    container_name: fullfill_backend
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER:-fullfill}:${POSTGRES_PASSWORD:-fullfill}@db:5432/${POSTGRES_DB:-fullfill}
      REDIS_URL: redis://redis:6379/0
      JWT_SECRET: ${JWT_SECRET:-change-me-in-production}
      JWT_EXPIRY_HOURS: ${JWT_EXPIRY_HOURS:-8}
      CORS_ORIGINS: ${CORS_ORIGINS:-http://localhost:5173}
      DEBUG: ${DEBUG:-false}
    ports:
      - "8000:8000"
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 5s
      timeout: 3s
      retries: 10

  frontend:
    build:
      context: ./frontend
    container_name: fullfill_frontend
    environment:
      VITE_API_BASE_URL: ${VITE_API_BASE_URL:-http://localhost:8000}
    ports:
      - "5173:5173"
    depends_on:
      backend:
        condition: service_healthy

volumes:
  db_data:
